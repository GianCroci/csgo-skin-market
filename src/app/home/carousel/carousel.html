<p-carousel
  [value]="productos"
  [numVisible]="3"
  [numScroll]="1"
  [circular]="true"
  [showIndicators]="true"
  [autoplayInterval]="5000"
>

  <ng-template let-prod pTemplate="item">
    <app-product-card
      [producto]="prod"
      (productoAgregado)="onProductoAgregado($event)">
    </app-product-card>
  </ng-template>

</p-carousel>

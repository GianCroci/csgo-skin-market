<p-card [subheader]="producto.rareza" styleClass="product-card">

  <ng-template pTemplate="header">
    <img
      [src]="producto.url_imagen"
      [alt]="producto.nombre_skin"
      class="product-image cursor-pointer"
      [routerLink]="['/skins', producto.id_skin]"> </ng-template>

  <ng-template pTemplate="title">
    <span
      class="cursor-pointer hover:text-primary transition-colors"
      [routerLink]="['/skins', producto.id_skin]">
      {{ producto.nombre_skin }}
    </span>
  </ng-template>

  <ng-template pTemplate="content">
    <p class="product-price">
      {{ producto.precio | currency:'USD':'symbol':'1.2-2' }}
    </p>
  </ng-template>

  <ng-template pTemplate="footer">
    <p-button
      label="Agregar al carrito"
      icon="pi pi-shopping-cart"
      (click)="agregarAlCarrito()">
    </p-button>
  </ng-template>
</p-card>

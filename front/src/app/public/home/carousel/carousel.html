<p-carousel
  [value]="productos"
  [responsiveOptions]="responsiveOptions"
  [numVisible]="4"
  [numScroll]="1"
  [circular]="true"
  [autoplayInterval]="5000"
>

  <ng-template let-prod pTemplate="item">
    <div class="carousel-item-wrapper">
      <app-product-card
        [producto]="prod"
        (productoAgregado)="onProductoAgregado($event)">
      </app-product-card>
    </div>
  </ng-template>

</p-carousel>

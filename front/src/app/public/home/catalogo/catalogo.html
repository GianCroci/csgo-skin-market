<div class="catalogo-container">
  
  <h1 class="catalogo-title">Catálogo Completo de Skins</h1>

  <div class="product-grid">

    @for (producto of skinsEnPaginaActual; track producto.id_skin) {
      
      <app-product-card
        [producto]="producto"
        (productoAgregado)="onAgregarProducto($event)">
      </app-product-card>

    } @empty {
      <p>Cargando skins o no se encontraron productos...</p>
    }
  </div>

  <p-paginator
    (onPageChange)="onPageChange($event)"
    [rows]="rows"
    [totalRecords]="totalRec"
  >
  </p-paginator>

</div>

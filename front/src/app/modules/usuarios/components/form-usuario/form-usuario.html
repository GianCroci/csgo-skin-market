<form [formGroup]="form" (ngSubmit)="sendUsuario()" autocomplete="off">
  <div class="row">
    <div class="col">
      <label for="nombre">Nombre:</label>
      <input
        type="text"
        formControlName="nombre"
        id="nombre"
        pInputText
        [style]="{ width: '100%' }"
      />
      @if(form.get('nombre')?.hasError('required') && form.get('nombre')?.touched){
      <span class="text-danger">Este campo es obligatorio</span>
      }
    </div>
  </div>

  <div class="row mt-3 text-center">
    <div class="col">
      <p-button
        type="submit"
        [disabled]="form.invalid"
        [label]="title"
        [rounded]="true"
        severity="success"
      ></p-button>
    </div>
  </div>
</form>

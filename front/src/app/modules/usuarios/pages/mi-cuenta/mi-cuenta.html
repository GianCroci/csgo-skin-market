<app-video-background>
  <div class="main-wrapper">
    <div class="perfil-container">

      <div class="perfil-img-container">
        <img [src]="imagenUrl" alt="perfil" class="agent-image">
      </div>

      <div class="info-container">
        @if (usuario(); as user) {
          <div class="perfil-card">
              <h1>{{user.nombre}} {{user.apellido}}</h1>

              <div class="perfil-details">
                <p class="data-row">
                    <span class="data-label">
                        <i class="pi pi-envelope"></i>
                        <strong>Email:</strong>
                    </span>
                    <span class="data-value">{{user.mail}}</span>
                </p>

                <p class="data-row">
                    <span class="data-label">
                        <i class="pi pi-map-marker"></i>
                        <strong>Provincia:</strong>
                    </span>
                    <span class="data-value">{{user.provincia || 'No especificada'}}</span>
                </p>

                <p class="data-row">
                    <span class="data-label">
                        <i class="pi pi-globe"></i>
                        <strong>País:</strong>
                    </span>
                    <span class="data-value">{{user.pais || 'No especificado'}}</span>
                </p>
              </div>
          </div>

          <div class="carousel-section">
            <h2>Inventario de Skins</h2>
            <p-carousel
              [value]="skins"
              [numVisible]="3"
              [numScroll]="1"
              [circular]="true"
              [responsiveOptions]="responsiveOptions"
              [autoplayInterval]="5000">
              <ng-template pTemplate="item" let-skin>
                  <div class="skin-card">
                      <div class="skin-image-wrapper">
                          <img [src]="skin.img" [alt]="skin.name" />
                      </div>
                      <div class="skin-name">{{ skin.name }}</div>
                  </div>
              </ng-template>
            </p-carousel>
          </div>
        }
      </div>
    </div>
  </div>
</app-video-background>

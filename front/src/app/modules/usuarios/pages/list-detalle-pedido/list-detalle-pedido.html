<p-table [value]="orden.productos" [tableStyle]="{ 'min-width': '60rem' }">
    <ng-template pTemplate="caption">
        <div class="flex items-center justify-between">
            <h1 class="text-xl font-bold">Orden #{{ orden.id }}</h1>
            <p-button icon="pi pi-refresh" rounded raised></p-button>
        </div>
    </ng-template>

    <ng-template pTemplate="header">
        <tr>
            <th>Nombre</th>
            <th>Imagen</th>
            <th>Precio</th>
            <th>Clasificación</th>
            <th>Cantidad</th>
        </tr>
    </ng-template>

    <ng-template pTemplate="body" let-producto>
        <tr>
            <td>{{ producto.nombre }}</td>
            <td>
                <img
                    [src]="producto.imagenUrl"
                    [alt]="producto.nombre"
                    class="w-24 rounded responsive-img"
                />
            </td>
            <td>{{ producto.precio | currency : 'ARS' }}</td>
            <td>{{ producto.clasificacion }}</td>
            <td>{{ producto.cantidad }}</td>
        </tr>
    </ng-template>

    <ng-template pTemplate="footer">
        <tr>
            <td colspan="5">
                En total hay {{ orden.productos.length }} productos.
            </td>
        </tr>
    </ng-template>
</p-table>

<div class="mb-4">
      <p-button
        label="Volver"
        icon="pi pi-arrow-left"
        [text]="true"
        (click)="goBack()">
      </p-button>
    </div>
<p-table [value]="orden?.skins" [tableStyle]="{ 'min-width': '60rem' }">
    <ng-template pTemplate="caption">
        <div class="flex items-center justify-between">
            <h1 class="text-xl font-bold">Orden #{{ orden?.id_orden }}</h1>
        </div>
        <div class="flex gap-8 mt-2">
            <p>Fecha: {{ orden?.fecha | date:'dd/MM/yyyy' }}</p>
            <p>Total: ARS ${{ orden?.total | number:'1.2-2' }}</p>
            <p>Estado: {{ orden?.estado }}</p>
        </div>
    </ng-template>

    <ng-template pTemplate="header">
        <tr>
            <th>Nombre</th>
            <th>Imagen</th>
            <th>Precio</th>
        </tr>
    </ng-template>

    <ng-template pTemplate="body" let-skin>
        <tr>
            <td>{{ skin.nombre_skin }}</td>
            <td>
                <img
                    [src]="skin.url_imagen"
                    [alt]="skin.nombre_skin"
                    class="w-24 rounded responsive-img"
                />
            </td>
            <td>ARS ${{ skin.precio | number:'1.2-2' }}</td>
        </tr>
    </ng-template>

    <ng-template pTemplate="footer">
        <tr>
            <td colspan="5">
                En total hay {{ orden?.skins?.length || 0 }} skins.
            </td>
        </tr>
    </ng-template>
</p-table>
